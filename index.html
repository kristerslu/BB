<!DOCTYPE html>
<html lang="nl">
<head>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="aeb9be0c-a9ba-460a-8f69-9bf2eae963ff"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Beta Beatrise — Fine Art</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff; --black: #000000; --muted: #777777; --accent: #c2b5a3;
            --sand: #fbfaf8; --dark: #1a1816; --border: #eeeeee;
        }

        /* RESET & SNAP */
        html { overflow: hidden; height: 100%; scroll-behavior: auto; }
        body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-y: scroll; overflow-x: hidden;
            scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch;
            font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); 
            line-height: 1.6; -webkit-font-smoothing: antialiased;
        }

        a, button, input, textarea, span { color: inherit; text-decoration: none; -webkit-tap-highlight-color: transparent; }
        .serif { font-family: 'Playfair Display', serif; font-weight: 400; }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* NAVIGATION */
        nav { 
            position: fixed; top: 0; left: 0; right: 0; width: 100%; z-index: 10000; 
            background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 1.2rem 0; border-bottom: 1px solid var(--border); box-sizing: border-box;
        }
        .nav-content { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
        .logo { font-size: 1.4rem; letter-spacing: 2px; justify-self: start; cursor: pointer; }
        .nav-links { display: flex; gap: 2rem; justify-self: center; }
        .nav-links a { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        
        .lang-dropdown { justify-self: end; position: relative; }
        .lang-trigger { background: none; border: 1px solid var(--black); padding: 4px 10px; font-size: 10px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: var(--white); min-width: 80px; border: 1px solid var(--border); z-index: 10001; margin-top: 5px; }
        .dropdown-content.show { display: block; }
        .dropdown-content button { padding: 10px; display: block; width: 100%; border: none; background: none; font-size: 10px; text-align: left; cursor: pointer; border-bottom: 1px solid var(--border); }

        /* SECTIONS */
        section, .artwork-page { 
            height: 100vh; height: 100dvh; width: 100%; 
            scroll-snap-align: center; scroll-snap-stop: always; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; box-sizing: border-box; text-align: center; 
        }

        /* HERO */
        .hero { 
            background-image: linear-gradient(rgba(255,255,255,0.79), rgba(255,255,255,0.79)), url('public/Paintings/1.jpg');
            background-size: cover; background-position: center; 
        }
        .hero-title { font-size: clamp(3.5rem, 10vw, 7rem); line-height: 0.9; margin: 0; letter-spacing: -2px; }
        .section-tag { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 700; margin-bottom: 1.5rem; border-bottom: 1px solid var(--accent); padding-bottom: 4px; display: inline-block; }
        
        .scroll-down { 
            margin: 3rem auto 0 auto; 
            width: 14px; 
            height: 14px; 
            border-right: 1px solid var(--muted); 
            border-bottom: 1px solid var(--muted); 
            transform: rotate(45deg); 
            animation: arrow-vertical 2s infinite ease-in-out;
        }

        @keyframes arrow-vertical {
            0%, 100% { transform: rotate(45deg) translate(0, 0); }
            50% { transform: rotate(45deg) translate(8px, 8px); }
        }

        /* NATIVE CSS GALLERY CAROUSEL */
        .artwork-container { width: 100%; max-width: 800px; padding: 0 1.5rem; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .carousel { position: relative; width: 100%; height: 50vh; background: transparent; overflow: hidden; cursor: pointer; }
        
        .carousel-track { 
            display: flex; align-items: center; 
            width: 100%; height: 100%; 
            overflow-x: auto; overflow-y: hidden; 
            scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; /* Hide in Firefox */
            -ms-overflow-style: none; /* Hide in IE */
        }
        .carousel-track::-webkit-scrollbar { display: none; /* Hide in Safari/Chrome */ }

        .carousel-track img { 
            flex: 0 0 100%; width: 100%; max-height: 100%; 
            object-fit: contain; padding: 15px; box-sizing: border-box; 
            scroll-snap-align: center; scroll-snap-stop: always; pointer-events: none;
        }

        /* TITLES & INFO */
        .art-title-btn { cursor: pointer; text-decoration: underline; text-underline-offset: 6px; text-decoration-thickness: 1px; transition: opacity 0.3s; margin: 0; }
        .price-tag { font-weight: 400; font-size: 0.95rem; color: #333; display: block; margin-top: 0.8rem; letter-spacing: 0.05em; }
        .size-tag { font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-top: 0.3rem; }

        /* FORMS */
        .alternative-email-section { margin-top: 2rem; }
        .contact-intro { font-size: 13px; color: var(--muted); margin-bottom: 0.4rem; font-weight: 300; }
        .contact-email { font-size: 14px; color: var(--black); text-decoration: underline; text-underline-offset: 4px; display: inline-block; font-weight: 400; }
        input, textarea { width: 100%; border: none; border-bottom: 1px solid #000; padding: 0.8rem 0; margin-bottom: 1rem; outline: none; background: transparent; font-family: inherit; font-size: 14px; box-sizing: border-box; border-radius: 0; }
        .submit-btn { background: #000; color: #fff; border: none; padding: 1.1rem; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 0.2em; transition: all 0.3s; display: block; margin: 0 auto; }
        .status-msg { font-size: 12px; margin-top: 10px; font-weight: 600; display: none; text-transform: uppercase; letter-spacing: 0.1em; }

        #inquire { padding-top: 60px; justify-content: center; }
        #inquire .reveal { width: 100%; max-width: 500px; padding: 0 1.5rem; box-sizing: border-box; text-align: center; }
        #inquire h2 { margin-bottom: 0.3rem !important; font-size: 1.8rem !important; line-height: 1.1; }
        #inquire p { font-size: 0.85rem; margin-bottom: 1.2rem !important; line-height: 1.3; color: var(--muted); font-weight: 300; }
        #inquire input { padding: 0.5rem 0; margin-bottom: 0.6rem; font-size: 13px; text-align: center; }
        #inquire textarea { height: 50px; padding: 0.5rem 0; margin-bottom: 0.8rem; font-size: 13px; resize: none; text-align: center; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background: #ffffff; overflow-y: auto; }
        .modal-content { max-width: 500px; width: 90%; margin: 5vh auto; padding: 2.5rem 1.5rem; position: relative; text-align: center; box-sizing: border-box; background: #ffffff; }
        .close-modal { position: absolute; top: 1rem; right: 1.5rem; font-size: 2rem; cursor: pointer; z-index: 20001; }

        .bg-dark { background-color: var(--dark); color: var(--white); }

        @media (max-width: 768px) {
            .nav-content { grid-template-columns: auto 1fr auto; }
            .nav-links { gap: 0.8rem; }
            .nav-links a { font-size: 8px; }
            .carousel { height: 40vh; }
            #inquire h2 { font-size: 1.5rem !important; }
            #inquire { padding-top: 40px; }
            .modal-content { margin: 2vh auto; padding: 2rem 1rem; }
        }
    </style>
</head>
<body>

    <div id="artModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 class="serif" id="modalTitle" style="font-size: 1.8rem; margin-bottom: 0.3rem;"></h2>
            <p style="margin-bottom: 1.5rem; font-weight: 300; font-size: 0.85rem; color: var(--muted);" data-key="modal-sub"></p>
            <form id="modalForm" action="https://formspree.io/f/xpqkjzkz" method="POST">
                <input type="hidden" name="Subject" id="hiddenSubject">
                <input type="text" name="name" data-key="p-name" placeholder="" required>
                <input type="email" name="email" data-key="p-email" placeholder="" required>
                <input type="tel" name="phone" data-key="p-phone" placeholder="">
                <textarea name="message" data-key="p-msg" placeholder=""></textarea>
                <button type="submit" class="submit-btn" data-key="form-btn">Verstuur</button>
                <div class="status-msg" id="modalStatus"></div>
            </form>
            <div class="alternative-email-section">
                <div class="contact-intro" data-key="email-intro"></div>
                <a href="mailto:info@betabeatrise.com" class="contact-email">info@betabeatrise.com</a>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-content">
            <div onclick="document.getElementById('top').scrollIntoView({behavior:'smooth'})" class="logo serif">BB</div>
            <div class="nav-links">
                <a href="#collection" data-key="nav-coll">Collectie</a>
                <a href="#about" data-key="nav-phil">Filosofie</a>
                <a href="#inquire" data-key="nav-inq">Aanvraag</a>
            </div>
            <div class="lang-dropdown">
                <button class="lang-trigger" id="langCurrent" onclick="toggleMenu(event)">NL</button>
                <div class="dropdown-content" id="langMenu">
                    <button onclick="setLang('nl')">NL</button>
                    <button onclick="setLang('fr')">FR</button>
                    <button onclick="setLang('en')">EN</button>
                </div>
            </div>
        </div>
    </nav>

    <section id="top" class="hero">
        <div class="reveal" style="width: 100%; max-width: 1100px; padding: 0 1.5rem; box-sizing: border-box; text-align: left;">
            <h1 class="hero-title serif">Beta<br>Beatrise</h1>
            <p style="max-width: 400px; margin-top: 2rem; font-size: 1.1rem; font-weight: 300; color: #333;" data-key="hero-desc"></p>
        </div>
        <div style="position: absolute; bottom: 6vh; left: 50%; transform: translateX(-50%);">
            <div class="scroll-down" style="margin: 0; border-color: #333;"></div>
        </div>
    </section>

    <section id="collection">
        <div class="reveal">
            <span class="section-tag" data-key="coll-tag"></span>
            <h2 class="serif" style="font-size: 2.5rem;">Golden Circle of Life</h2>
            <p style="font-weight: 300; color: var(--muted);" data-key="coll-desc"></p>
            <div class="scroll-down"></div>
        </div>
    </section>

    <div id="gallery-root"></div>

    <section id="about" style="background-color: var(--sand); border-top: 1px solid var(--border);">
        <div class="reveal" style="max-width: 700px; padding: 0 1.5rem;">
            <span class="section-tag" data-key="about-tag"></span>
            <h2 class="serif" style="font-size: 2.2rem; margin-bottom: 1.5rem;" data-key="about-title"></h2>
            <p style="font-size: 1.1rem; line-height: 1.8; font-weight: 300;" data-key="about-text"></p>
        </div>
    </section>

    <section id="inquire">
        <div class="reveal">
            <span class="section-tag" data-key="nav-inq"></span>
            <h2 class="serif" data-key="form-title"></h2>
            <p data-key="form-desc"></p>
            <form id="mainForm" action="https://formspree.io/f/xpqkjzkz" method="POST">
                <input type="hidden" name="Subject" value="Custom Art Inquiry">
                <input type="text" name="name" data-key="p-name" placeholder="" required>
                <input type="email" name="email" data-key="p-email" placeholder="" required>
                <input type="tel" name="phone" data-key="p-phone" placeholder="">
                <textarea name="message" data-key="p-msg-l" placeholder="" required></textarea>
                <button type="submit" class="submit-btn" data-key="form-btn">Verstuur</button>
                <div class="status-msg" id="mainStatus"></div>
            </form>
            <div class="alternative-email-section">
                <div class="contact-intro" data-key="email-intro"></div>
                <a href="mailto:info@betabeatrise.com" class="contact-email">info@betabeatrise.com</a>
            </div>
        </div>
    </section>

    <section id="interior" class="bg-dark">
        <div class="reveal">
            <span class="section-tag" data-key="int-tag"></span>
            <h2 class="serif" style="font-size: 2.2rem;" data-key="int-title"></h2>
            <p style="font-weight: 300; opacity: 0.8; margin-top: 1rem;" data-key="int-desc"></p>
            <span style="color: var(--accent); letter-spacing: 0.5em; font-size: 11px; font-weight: 700; margin-top: 4rem; display: block;" data-key="soon"></span>
        </div>
    </section>

    <script>
        // RESET URL & SCROLL ON LOAD
        if (history.scrollRestoration) { history.scrollRestoration = 'manual'; }
        window.onbeforeunload = function () { window.scrollTo(0, 0); };
        
        window.onload = function() {
            if (window.location.hash) {
                history.replaceState(null, null, window.location.pathname);
            }
            setTimeout(() => { window.scrollTo(0, 0); }, 10);
        };

        const translations = {
            nl: {
                "nav-coll": "Collectie", "nav-phil": "Filosofie", "nav-inq": "Aanvraag",
                "hero-desc": "Abstracte composities. Zware texturen. Glinsteringen van 24k goud.",
                "coll-tag": "Beschikbaar Werk", "coll-desc": "Ontdek de collectie",
                "about-tag": "Filosofie", "about-title": "Elegantie in de Puurheid", "about-text": "Beta Beatrise verkent de verbinding tussen ruw materiaal en verfijnde elegantie. Haar werken kennen geen vaste boven- of onderkant; ze zijn ontworpen om gedraaid te worden, zodat de kijker zijn eigen perspectief en emotie in de compositie kan vinden.",
                "int-tag": "Interieur", "int-title": "Interieuradvies", "int-desc": "Wist je dat ik ook advies geef?<br>Van kunst aan de muur tot een volledig harmonieus interieur.", "soon": "BINNENKORT",
                "form-title": "Uniek Schilderij", "form-desc": "Wilt u een werk dat perfect bij uw interieur past? Laat uw gegevens achter voor een vrijblijvende aanvraag.", "form-btn": "Verstuur Aanvraag",
                "modal-sub": "Heeft u interesse in dit werk? Laat hieronder uw gegevens achter.",
                "email-intro": "Of stuur rechtstreeks een e-mail:",
                "p-name": "Naam", "p-email": "E-mail", "p-phone": "Telefoon (Optioneel)", "p-msg": "Bericht", "p-msg-l": "Formaat, kleurenpalet, etc.",
                "art0": "Begin van het Licht", "art1": "Gouden Cascade", "art2": "Vergulde Wandeling", "art3": "Sporen van Goud",
                "success": "Bericht verstuurd!", "error": "Oeps! Er ging iets mis."
            },
            en: {
                "nav-coll": "Collection", "nav-phil": "Philosophy", "nav-inq": "Inquiry",
                "hero-desc": "Abstract compositions. Heavy textures. Glimmers of 24k gold.",
                "coll-tag": "Available Work", "coll-desc": "Discover the collection",
                "about-tag": "Philosophy", "about-title": "Elegance in the Raw", "about-text": "Beta Beatrise explores the connection between raw material and refined elegance. Her works have no fixed top or bottom; they are designed to be rotated, allowing the viewer to find their own perspective and emotion within the composition.",
                "int-tag": "Interior", "int-title": "Interior Design", "int-desc": "Did you know I also provide advice?<br>From wall art to a fully harmonious interior.", "soon": "COMING SOON",
                "form-title": "Custom Painting", "form-desc": "Looking for a unique piece? Leave your details below for a non-binding inquiry.", "form-btn": "Send Inquiry",
                "modal-sub": "Are you interested in this piece? Leave your details below.",
                "email-intro": "Or send me an email directly:",
                "p-name": "Name", "p-email": "Email", "p-phone": "Phone (Optional)", "p-msg": "Message", "p-msg-l": "Describe your preferences (size, palette, etc.)",
                "art0": "Beginning of Light", "art1": "Golden Cascade", "art2": "Gilded Walk", "art3": "Traces of Gold",
                "success": "Message sent!", "error": "Oops! Something went wrong."
            },
            fr: {
                "nav-coll": "Collection", "nav-phil": "Philosophie", "nav-inq": "Demande",
                "hero-desc": "Compositions abstraites. Textures lourdes. Éclats d'or 24 carats.",
                "coll-tag": "Travail Disponible", "coll-desc": "Découvrez la collection",
                "about-tag": "Philosophie", "about-title": "L'Élégance à l'État Brut", "about-text": "Beta Beatrise explore le lien entre la matière brute et l'élégance raffinée. Ses œuvres n'ont ni haut ni bas fixe ; elles sont conçues pour être pivotées, permettant au spectateur de trouver sa propre perspective et émotion au sein de la composition.",
                "int-tag": "Intérieur", "int-title": "Conseil d'Intérieur", "int-desc": "Saviez-vous que je donne ook des conseils ?<br>De l'art mural à un intérieur totalement harmonieux.", "soon": "BIENTÔT DISPONIBLE",
                "form-title": "Peinture Unique", "form-desc": "Vous recherchez une pièce unique ? Laissez vos coordonnées ci-dessous.", "form-btn": "Envoyer la Demande",
                "modal-sub": "Êtes-vous intéressé par cette œuvre ? Laissez vos coordonnées ci-dessous.",
                "email-intro": "Ou envoyez-moi un e-mail directement :",
                "p-name": "Nom", "p-email": "E-mail", "p-phone": "Telefoon (Optionnel)", "p-msg": "Message", "p-msg-l": "Décrivez vos préférences (format, palette, etc.)",
                "art0": "Commencement de la Lumière", "art1": "Cascade Dorée", "art2": "Promenade Dorée", "art3": "Traces d'Or",
                "success": "Message envoyé !", "error": "Oups ! Quelque chose s'est mal passé."
            }
        };

        const artworks = [
            { id: "art0", price: "€ 280", size: "70x140 cm", images: ["public/Paintings/1.jpg", "public/Paintings/2.jpg", "public/Paintings/3.jpg", "public/Paintings/4.jpg", "public/Paintings/5.jpg"] },
            { id: "art1", price: "€ 180", size: "60x80 cm", images: ["public/Paintings/6.jpg", "public/Paintings/7.jpg", "public/Paintings/8.jpg", "public/Paintings/9.jpg"] },
            { id: "art2", price: "€ 85", size: "30x30 cm", images: ["public/Paintings/10.jpg", "public/Paintings/11.jpg", "public/Paintings/12.jpg", "public/Paintings/13.jpg", "public/Paintings/14.jpg", "public/Paintings/15.jpg"] },
            { id: "art3", price: "€ 100", size: "50x50 cm", images: ["public/Paintings/16.jpg", "public/Paintings/17.jpg", "public/Paintings/18.jpg", "public/Paintings/19.jpg"] }
        ];

        function setLang(lang) {
            document.querySelectorAll('[data-key]').forEach(el => { 
                const key = el.getAttribute('data-key');
                if (translations[lang] && translations[lang][key]) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = translations[lang][key];
                    else el.innerHTML = translations[lang][key];
                }
            });
            document.getElementById('langCurrent').innerText = lang.toUpperCase();
            document.getElementById('langMenu').classList.remove('show');
        }

        const root = document.getElementById('gallery-root');
        artworks.forEach((art, idx) => {
            root.insertAdjacentHTML('beforeend', `
                <div class="artwork-page" id="page-${idx}" data-idx="${idx}">
                    <div class="artwork-container reveal">
                        <div class="carousel" onclick="handleCarouselClick(event, ${idx}, '${art.id}')">
                            <div class="carousel-track" id="t-${idx}">
                                ${art.images.map((img, i) => `<img src="${img}" alt="Art">`).join('')}
                            </div>
                        </div>
                        <div style="margin-top: 1.5rem;">
                            <h3 class="serif art-title-btn" onclick="openModal('${art.id}')" data-key="${art.id}">${translations['nl'][art.id]}</h3>
                            <span class="price-tag">${art.price}</span>
                            <span class="size-tag">${art.size}</span>
                        </div>
                    </div>
                </div>`);
        });

        // NATIVE SCROLL CLICK HANDLING
        function handleCarouselClick(event, idx, id) {
            const track = document.getElementById(`t-${idx}`);
            const rect = event.currentTarget.getBoundingClientRect();
            const x = event.clientX - rect.left;
            
            // If clicked left 30%, scroll left natively. Right 30% scrolls right. Center opens modal.
            if (x < rect.width * 0.3) {
                track.scrollBy({ left: -rect.width, behavior: 'smooth' });
            } else if (x > rect.width * 0.7) {
                track.scrollBy({ left: rect.width, behavior: 'smooth' });
            } else {
                openModal(id);
            }
        }

        // RESET NATIVE SCROLL TO START
        function resetGallery(idx) {
            const track = document.getElementById(`t-${idx}`);
            if (track) track.scrollTo({ left: 0, behavior: 'instant' });
        }

        function openModal(artId) {
            const currentLang = document.getElementById('langCurrent').innerText.toLowerCase();
            document.getElementById('modalTitle').innerText = translations[currentLang][artId];
            document.getElementById('hiddenSubject').value = "Interest: " + translations[currentLang][artId];
            document.getElementById('artModal').style.display = "block";
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() { document.getElementById('artModal').style.display = "none"; document.body.style.overflow = 'auto'; }
        function toggleMenu(e) { e.stopPropagation(); document.getElementById('langMenu').classList.toggle('show'); }
        window.onclick = () => document.getElementById('langMenu').classList.remove('show');

        async function handleSubmit(event, statusId) {
            event.preventDefault();
            const form = event.target;
            const status = document.getElementById(statusId);
            const btn = form.querySelector('button');
            const currentLang = document.getElementById('langCurrent').innerText.toLowerCase();
            btn.innerText = "Sending..."; 
            fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } }).then(response => {
                if (response.ok) {
                    status.innerHTML = translations[currentLang]['success'];
                    status.style.display = "block"; form.reset(); btn.innerText = translations[currentLang]['form-btn'];
                    setTimeout(() => { status.style.display = "none"; if(statusId === 'modalStatus') closeModal(); }, 3000);
                }
            });
        }

        document.getElementById('mainForm').addEventListener('submit', (e) => handleSubmit(e, 'mainStatus'));
        document.getElementById('modalForm').addEventListener('submit', (e) => handleSubmit(e, 'modalStatus'));

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

        const resetObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.intersectionRatio < 0.8) {
                    const idx = entry.target.getAttribute('data-idx');
                    if (idx !== null) resetGallery(idx);
                }
            });
        }, { threshold: [0, 0.2, 0.5, 0.8, 1.0] });
        document.querySelectorAll('.artwork-page').forEach(el => resetObserver.observe(el));

        setLang('nl');
    </script>
</body>
</html>

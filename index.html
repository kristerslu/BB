<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery | Official Site</title>
    <style>
        /* Modern Reset & Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; background: #fff; }
        
        /* Force Scroll to Top Logic */
        html { scroll-behavior: auto; }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #f4f4f4; /* Placeholder for your hero bg */
        }
        h1 { font-size: 4rem; color: #000; text-transform: uppercase; letter-spacing: 5px; }
        p.subtitle { font-size: 1.2rem; color: #000; margin-top: 10px; }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .art-card {
            cursor: pointer;
            overflow: hidden;
            border: 1px solid #eee;
            transition: transform 0.3s ease;
        }
        .art-card:hover { transform: translateY(-5px); }
        .art-card img { width: 100%; height: 400px; object-fit: cover; display: block; }
        .art-info { padding: 15px; text-align: center; }
        .art-title { font-weight: bold; font-size: 1.1rem; }
        .art-price { color: #666; margin-top: 5px; }

        /* Modal (Pop-up) Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: #fff;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10;
        }
        .modal-image img { width: 100%; height: 100%; object-fit: cover; }
        .modal-details { padding: 40px; }
        
        /* Form Styles */
        form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        input, textarea {
            padding: 12px;
            border: 1px solid #ddd;
            width: 100%;
            font-size: 1rem;
        }
        button {
            padding: 15px;
            background: #000;
            color: #fff;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #333; }

        @media (max-width: 768px) {
            .modal-content { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>ART PIECE NAME</h1>
        <p class="subtitle">Fine Art Collection</p>
    </header>

    <div class="gallery">
        <div class="art-card" onclick="openModal('Artwork One', '€1,200', 'https://via.placeholder.com/600x800?text=Art+1')">
            <img src="https://via.placeholder.com/600x800?text=Art+1" alt="Art 1">
            <div class="art-info">
                <div class="art-title">Artwork One</div>
                <div class="art-price">€1,200</div>
            </div>
        </div>

        <div class="art-card" onclick="openModal('Shadows of Blue', '€2,500', 'https://via.placeholder.com/600x800?text=Art+2')">
            <img src="https://via.placeholder.com/600x800?text=Art+2" alt="Art 2">
            <div class="art-info">
                <div class="art-title">Shadows of Blue</div>
                <div class="art-price">€2,500</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal(event)">&times;</span>
            <div class="modal-image">
                <img id="modalImg" src="" alt="Selected Art">
            </div>
            <div class="modal-details">
                <h2 id="modalTitle">Art Title</h2>
                <p id="modalPrice" style="font-size: 1.5rem; margin-bottom: 20px;">Price</p>
                <hr>
                <p style="margin-top: 20px; font-weight: bold;">Interested in this piece?</p>
                <p>Leave your details and I will contact you shortly.</p>
                
                <form action="https://formspree.io/f/YOUR_ENDPOINT_HERE" method="POST">
                    <input type="hidden" name="_subject" id="formSubject" value="Inquiry">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <input type="tel" name="phone" placeholder="Phone Number">
                    <textarea name="message" rows="4" placeholder="Message (Optional)"></textarea>
                    <button type="submit">Send Inquiry</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Triple-Lock Scroll to Top on Refresh
        if (history.scrollRestoration) { history.scrollRestoration = 'manual'; }
        window.scrollTo(0, 0);
        window.onbeforeunload = function () { window.scrollTo(0, 0); };

        // Modal Functions
        function openModal(title, price, imgSrc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalPrice').innerText = price;
            document.getElementById('modalImg').src = imgSrc;
            document.getElementById('formSubject').value = "Inquiry for: " + title;
            document.getElementById('modalOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop background scroll
        }

        function closeModal(e) {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'auto'; // Re-enable scroll
        }
    </script>
</body>
</html>

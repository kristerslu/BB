<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Beta Beatrise — Fine Art</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --black: #000000;
            --muted: #777777;
            --accent: #c2b5a3;
            --hero-bg: #f9f7f4;
            --border: #eeeeee;
        }

        html { visibility: hidden; }
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); 
            line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        /* REVEAL ON SCROLL */
        .reveal {
            opacity: 0; filter: blur(8px); transform: translateY(20px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active { opacity: 1; filter: blur(0px); transform: translateY(0); }

        .serif { font-family: 'Playfair Display', serif; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

        nav { 
            position: fixed; top: 0; width: 100%; z-index: 10000; 
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 1.2rem 0; border-bottom: 1px solid var(--border); 
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; padding: 0 1rem; }
        .logo { text-decoration: none; color: var(--black); font-size: 1.2rem; }
        .nav-links { display: flex; gap: 1.5rem; margin: 0 auto; }
        .nav-links a { text-decoration: none; color: var(--black) !important; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }

        section { padding: 8rem 0; text-align: center; }
        .hero { min-height: 100vh; display: flex; align-items: center; text-align: left; background: var(--hero-bg); }
        .top-spacer { height: 10rem; }

        .hero-title { font-size: clamp(3.5rem, 10vw, 7rem); line-height: 0.9; margin: 0; font-weight: 400; }
        .section-tag { font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; font-weight: 700; margin-bottom: 2.5rem; display: inline-block; border-bottom: 1px solid var(--accent); padding-bottom: 4px; }

        /* THE ART GALLERY - CLEAN & MINIMAL */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 6rem 4rem; margin-top: 4rem; text-align: left; }
        
        .carousel { 
            position: relative; width: 100%; overflow: hidden; background: transparent; cursor: pointer;
        }

        .carousel-track { position: relative; width: 100%; display: grid; grid-template-areas: "stack"; }

        .carousel-track img { 
            grid-area: stack;
            width: 100%; height: auto; 
            opacity: 0;
            transition: opacity 0.8s ease-in-out; /* Simple, confident fade */
            background: transparent;
        }

        .carousel-track img.active-slide {
            opacity: 1; z-index: 2;
        }

        /* Nav Arrows - Glass Effect */
        .c-arrow { 
            position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px;
            background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border: none; 
            border-radius: 50%; color: var(--black); cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; z-index: 10; opacity: 0; transition: opacity 0.3s ease;
        }
        .carousel:hover .c-arrow { opacity: 1; }
        .c-prev { left: 10px; } .c-next { right: 10px; }

        /* FORM */
        .form-container { width: 100%; max-width: 500px; margin: 2rem auto; text-align: left; }
        input, textarea { width: 100%; border: none; border-bottom: 1px solid #000; padding: 1.5rem 0; margin-bottom: 1rem; outline: none; background: transparent; font-family: inherit; }
        .btn { background: var(--black); color: #fff; border: none; padding: 1.5rem; text-transform: uppercase; letter-spacing: 0.25em; font-size: 10px; width: 100%; cursor: pointer; }
        
        #form-status { display: none; text-align: center; padding: 2rem 0; }

        @media (max-width: 600px) {
            section { padding: 5rem 0; }
            .c-arrow { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div id="top" style="position: absolute; top: 0; height: 1px; width: 1px;"></div>

    <nav>
        <div class="container nav-content">
            <a href="#top" class="logo serif">BB</a>
            <div class="nav-links">
                <a href="#collection">Collection</a>
                <a href="#about">Philosophy</a>
                <a href="#inquire">Inquiry</a>
            </div>
            <button class="serif" style="background:none; border:1px solid #000; padding:2px 8px; font-size:10px;">NL</button>
        </div>
    </nav>

    <section class="hero">
        <div class="container reveal">
            <h1 class="hero-title serif">Beta<br>Beatrise</h1>
            <p style="max-width: 450px; margin-top: 2.5rem; font-size: 1.1rem; font-weight: 300; color: var(--muted);">Abstracte composities. Zware texturen. Glinsteringen van 24k goud.</p>
        </div>
    </section>

    <div class="top-spacer"></div>

    <section id="collection" class="container">
        <div class="reveal">
            <span class="section-tag">Beschikbaar Werk</span>
            <h2 class="section-title serif">Golden Circle of Life</h2>
        </div>
        <div class="gallery-grid" id="gallery"></div>
    </section>

    <section id="inquire" class="container">
        <div class="reveal">
            <span class="section-tag">Inquiry</span>
            <h2 class="section-title serif">Start a Conversation</h2>
            <div class="form-container">
                <form id="contact-form" action="https://formspree.io/f/xpqkjzkz" method="POST">
                    <input type="text" name="name" placeholder="Naam" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <textarea name="message" rows="4" placeholder="Beschrijf uw idee." required></textarea>
                    <button id="submit-btn" type="submit" class="btn">Verstuur Aanvraag</button>
                </form>
                <div id="form-status">
                    <p class="serif italic" style="font-size: 1.8rem;">Dank u.</p>
                    <p style="color: var(--muted);">Uw bericht is succesvol verzonden.</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        window.addEventListener('load', () => {
            document.documentElement.style.visibility = 'visible';
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });

        const artworks = [
            { title: "Golden Circle I", price: "€ 1.800", images: ["public/Paintings/1.jpg", "public/Paintings/2.jpg", "public/Paintings/3.jpg", "public/Paintings/4.jpg", "public/Paintings/5.jpg"] },
            { title: "Golden Circle II", price: "€ 2.100", images: ["public/Paintings/6.jpg", "public/Paintings/7.jpg", "public/Paintings/8.jpg", "public/Paintings/9.jpg"] },
            { title: "Golden Circle III", price: "€ 1.950", images: ["public/Paintings/10.jpg", "public/Paintings/11.jpg", "public/Paintings/12.jpg", "public/Paintings/13.jpg", "public/Paintings/14.jpg", "public/Paintings/15.jpg"] },
            { title: "Golden Circle IV", price: "€ 2.400", images: ["public/Paintings/16.jpg", "public/Paintings/17.jpg", "public/Paintings/18.jpg", "public/Paintings/19.jpg"] }
        ];

        const gal = document.getElementById('gallery');
        artworks.forEach((art, artIdx) => {
            let imagesHtml = art.images.map((img, i) => `<img src="${img}" class="${i === 0 ? 'active-slide' : ''}" alt="${art.title}">`).join('');
            gal.innerHTML += `
                <div class="artwork-card reveal">
                    <div class="carousel" onclick="moveSlide(${artIdx}, 1)">
                        <button class="c-arrow c-prev" onclick="event.stopPropagation(); moveSlide(${artIdx}, -1)">&#8249;</button>
                        <div class="carousel-track" id="track-${artIdx}">${imagesHtml}</div>
                        <button class="c-arrow c-next" onclick="event.stopPropagation(); moveSlide(${artIdx}, 1)">&#8250;</button>
                    </div>
                    <h3 class="serif italic" style="font-size: 1.3rem; margin-top:1.5rem; letter-spacing: 0.02em;">${art.title}</h3>
                    <span style="font-weight:600; font-size: 0.85rem; color: var(--muted);">${art.price}</span>
                </div>
            `;
        });

        let currentSlides = artworks.map(() => 0);
        function moveSlide(artIdx, step) {
            const track = document.getElementById(`track-${artIdx}`);
            const imgs = track.querySelectorAll('img');
            imgs[currentSlides[artIdx]].classList.remove('active-slide');
            currentSlides[artIdx] = (currentSlides[artIdx] + step + imgs.length) % imgs.length;
            imgs[currentSlides[artIdx]].classList.add('active-slide');
        }

        const form = document.getElementById("contact-form");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            document.getElementById("submit-btn").innerText = "...";
            const response = await fetch(e.target.action, { method: 'POST', body: new FormData(e.target), headers: { 'Accept': 'application/json' } });
            if (response.ok) { 
                form.style.display = "none"; 
                document.getElementById("form-status").style.display = "block"; 
            }
        });
    </script>
</body>
</html>

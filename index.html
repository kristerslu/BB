<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Beta Beatrise — Fine Art</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --black: #000000;
            --muted: #777777;
            --accent: #c2b5a3;
            --hero-bg: #f9f7f4;
            --sand: #fbfaf8;
            --dark: #1a1816;
            --border: #eeeeee;
        }

        /* 1. MANDATORY SCROLL SNAPPING */
        html { 
            scroll-behavior: smooth; 
            scroll-snap-type: y mandatory; 
            overflow-y: scroll;
            height: 100%;
        }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); 
            line-height: 1.6; -webkit-font-smoothing: antialiased;
        }

        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .serif { font-family: 'Playfair Display', serif; font-weight: 400; }
        .container { max-width: 850px; margin: 0 auto; padding: 0 1.5rem; }

        nav { 
            position: fixed; top: 0; width: 100%; z-index: 10000; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 1rem 0; border-bottom: 1px solid var(--border); 
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
        .logo { text-decoration: none; color: var(--black); font-size: 1.5rem; }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { text-decoration: none; color: var(--black); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }

        /* 2. PAGE SECTIONS */
        section, .artwork-page { 
            height: 100vh; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start; 
            scroll-snap-stop: always;
            padding: 80px 20px 40px; /* Space for nav */
            box-sizing: border-box;
        }

        .hero { background: var(--hero-bg); text-align: left; align-items: flex-start; }
        .bg-sand { background-color: var(--sand); }
        .bg-dark { background-color: var(--dark); color: var(--white); }

        .hero-title { font-size: clamp(3rem, 10vw, 7rem); line-height: 1; margin: 0; }
        .section-tag { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 1rem; border-bottom: 1px solid var(--accent); padding-bottom: 4px; }

        /* 3. THE ARTWORK FIX */
        .artwork-page { background: #fff; }
        
        .artwork-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .carousel { 
            position: relative; 
            width: 100%; 
            height: 65vh; /* Limits image height to 65% of the screen */
            display: flex;
            justify-content: center; 
            align-items: center;
            border: 1px solid var(--border);
            background: #fff;
            padding: 10px;
            overflow: hidden;
        }
        
        .carousel-track { 
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carousel-track img { 
            max-width: 100%; 
            max-height: 100%; 
            position: absolute;
            opacity: 0; 
            transition: opacity 0.5s ease;
            object-fit: contain; /* CRITICAL: NO CROPPING */
        }

        .carousel-track img.active-slide { opacity: 1; position: relative; }

        .c-arrow { 
            position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px;
            background: rgba(255,255,255,0.8); border: 1px solid var(--border); border-radius: 50%; 
            z-index: 10; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.3s;
        }
        .c-arrow:hover { background: #fff; }
        .c-prev { left: 10px; } .c-next { right: 10px; }

        .artwork-info { margin-top: 1.5rem; text-align: center; }

        /* FORM */
        .form-container { width: 100%; max-width: 400px; text-align: left; }
        input, textarea { width: 100%; border: none; border-bottom: 1px solid #000; padding: 0.8rem 0; margin-bottom: 1rem; background: transparent; }
        .btn { background: #000; color: #fff; border: none; padding: 1rem; width: 100%; cursor: pointer; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }

        @media (max-width: 600px) {
            .nav-links { display: none; }
            .carousel { height: 50vh; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content">
            <a href="#" class="logo serif">BB</a>
            <div class="nav-links">
                <a href="#collection">Works</a>
                <a href="#about">About</a>
                <a href="#inquire">Inquiry</a>
            </div>
        </div>
    </nav>

    <section id="top" class="hero">
        <div class="container reveal">
            <h1 class="hero-title serif">Beta<br>Beatrise</h1>
            <p style="font-weight: 300; color: var(--muted);">Abstracte composities & 24k goud.</p>
        </div>
    </section>

    <section id="collection">
        <div class="container reveal">
            <span class="section-tag">Collectie</span>
            <h2 class="serif">Golden Circle of Life</h2>
        </div>
    </section>

    <div id="gallery-root"></div>

    <section id="about" class="bg-sand">
        <div class="container reveal">
            <span class="section-tag">Philosophy</span>
            <h2 class="serif">Elegance in the Raw</h2>
            <p style="max-width: 500px; margin: 0 auto; font-weight: 300;">Exploratie van ruwe texturen en verfijnde luxe.</p>
        </div>
    </section>

    <section id="inquire">
        <div class="container reveal">
            <span class="section-tag">Contact</span>
            <h2 class="serif">Inquiry</h2>
            <div class="form-container">
                <form action="https://formspree.io/f/xpqkjzkz" method="POST">
                    <input type="text" name="name" placeholder="Naam">
                    <input type="email" name="email" placeholder="Email">
                    <textarea name="message" rows="3" placeholder="Uw bericht"></textarea>
                    <button type="submit" class="btn">Verstuur</button>
                </form>
            </div>
        </div>
    </section>

    <script>
        const artworks = [
            { title: "Golden Circle I", price: "€ 1.800", images: ["public/Paintings/1.jpg", "public/Paintings/2.jpg", "public/Paintings/3.jpg"] },
            { title: "Golden Circle II", price: "€ 2.100", images: ["public/Paintings/6.jpg", "public/Paintings/7.jpg", "public/Paintings/8.jpg"] },
            { title: "Golden Circle III", price: "€ 1.950", images: ["public/Paintings/10.jpg", "public/Paintings/11.jpg", "public/Paintings/12.jpg"] },
            { title: "Golden Circle IV", price: "€ 2.400", images: ["public/Paintings/16.jpg", "public/Paintings/17.jpg", "public/Paintings/18.jpg"] }
        ];

        const root = document.getElementById('gallery-root');
        artworks.forEach((art, idx) => {
            const html = `
                <div class="artwork-page">
                    <div class="artwork-container reveal">
                        <div class="carousel">
                            <button class="c-arrow c-prev" onclick="move(${idx}, -1)">&#8249;</button>
                            <div class="carousel-track" id="t-${idx}">
                                ${art.images.map((img, i) => `<img src="${img}" class="${i===0?'active-slide':''}">`).join('')}
                            </div>
                            <button class="c-arrow c-next" onclick="move(${idx}, 1)">&#8250;</button>
                        </div>
                        <div class="artwork-info">
                            <h3 class="serif" style="margin:0">${art.title}</h3>
                            <p style="margin:5px 0; color:var(--muted)">${art.price}</p>
                        </div>
                    </div>
                </div>
            `;
            root.insertAdjacentHTML('beforeend', html);
        });

        let states = artworks.map(() => 0);
        function move(idx, dir) {
            const track = document.getElementById(`t-${idx}`);
            const imgs = track.querySelectorAll('img');
            imgs[states[idx]].classList.remove('active-slide');
            states[idx] = (states[idx] + dir + imgs.length) % imgs.length;
            imgs[states[idx]].classList.add('active-slide');
        }

        const observer = new IntersectionObserver(ents => {
            ents.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(r => observer.observe(r));
    </script>
</body>
</html>
